<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Basket Clock">
    <title>Basket Clock</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main id="app" class="app" aria-label="Basketball timer and scoreboard">
      <section id="controls" class="controls" aria-label="Controls">
        <button id="startStopBtn" class="icon-btn icon-primary" type="button" aria-label="Start">
          <span class="control-icon play-icon" aria-hidden="true"></span>
        </button>
        <button id="resetTimerBtn" class="icon-btn" type="button" aria-label="Reset timer">&#8634;</button>
        <button id="resetScoresBtn" class="icon-btn" type="button" aria-label="Reset scores">&#9003;</button>
        <button id="modeToggleBtn" class="icon-btn mode-btn" type="button" aria-label="Timer only mode">T</button>
      </section>

      <section class="display-area" aria-label="Display">
        <section id="timerZone" class="timer-zone" aria-label="Timer">
          <div id="runningTimer" class="running-timer" aria-live="polite">10:00</div>
          <div id="timerPicker" class="timer-picker" aria-live="polite">
            <div id="minuteWheel" class="wheel" aria-label="Minutes">
              <div id="minutePrev" class="wheel-side">09</div>
              <div id="minuteValue" class="wheel-value">10</div>
              <div id="minuteNext" class="wheel-side">11</div>
            </div>
            <div class="timer-separator">:</div>
            <div id="secondWheel" class="wheel" aria-label="Seconds">
              <div id="secondPrev" class="wheel-side">50</div>
              <div id="secondValue" class="wheel-value">00</div>
              <div id="secondNext" class="wheel-side">10</div>
            </div>
          </div>
        </section>

        <section class="score-zone" aria-label="Scores">
          <article id="homePanel" class="score-panel" aria-label="Left score">
            <div id="homeScore" class="score-display">0</div>
          </article>
          <article id="awayPanel" class="score-panel" aria-label="Right score">
            <div id="awayScore" class="score-display">0</div>
          </article>
        </section>
      </section>
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js", { scope: "./" })
            .then((registration) => {
              console.log("Service Worker registered:", registration.scope);
              console.log("Service Worker state:", {
                installing: registration.installing && registration.installing.state,
                waiting: registration.waiting && registration.waiting.state,
                active: registration.active && registration.active.state
              });
              registration.update().catch((error) => {
                console.warn("Service Worker update check failed:", error);
              });
              return navigator.serviceWorker.ready;
            })
            .then((registration) => {
              console.log("Service Worker ready:", registration.scope);
              if (!("caches" in window)) return;
              return caches.match(new URL("./index.html", window.location.href).toString()).then((cachedIndex) => {
                console.log("Offline index cached:", Boolean(cachedIndex));
              });
            })
            .catch((error) => {
              console.error("Service Worker registration failed:", error);
            });

          navigator.serviceWorker.addEventListener("controllerchange", () => {
            console.log("Service Worker controller changed.");
          });
        });
      } else {
        console.warn("Service Worker is not supported.");
      }
    </script>
    <script src="app.js"></script>
  </body>
</html>
